<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Recommendation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="page-bg"></div>

    <main class="layout">
      <aside class="sidebar">
        <h1>Anime Recommender</h1>
        <p class="subtitle">Tìm anime tương tự</p>
        <div class="form-group autocomplete-wrap">
          <label for="animeInput">Nhập tên Anime:</label>
          <input
            type="text"
            id="animeInput"
            placeholder="Nhập tên anime..."
            autocomplete="off"
          />
          <div id="autocompleteList" class="autocomplete-list hidden"></div>
        </div>

        <div class="form-group">
          <label for="countInput">Số lượng gợi ý:</label>
          <input type="number" id="countInput" min="1" max="50" value="10" />
        </div>

        <button id="recommendBtn">Gợi ý Anime</button>
        <p id="statusText" class="status-text"></p>
      </aside>

      <section class="content">
        <h2>Kết quả gợi ý</h2>
        <div id="resultsGrid" class="results-grid"></div>
      </section>
    </main>

    <script id="animeData" type="application/json">
      {{ anime_titles | tojson }}
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
